name: 🐛 Rapport de bug
description: Signaler un comportement inattendu
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de signaler ce bug. Remplissez les champs ci-dessous pour nous aider à le reproduire et le corriger rapidement.

  - type: input
    id: version
    attributes:
      label: Version de PDF Editor
      description: Visible dans Aide → À propos
      placeholder: ex. 1.4.1
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Système d'exploitation
      options:
        - Windows 11
        - Windows 10
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Décrivez clairement ce qui se passe
      placeholder: En cliquant sur X, il se produit Y au lieu de Z…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Liste des actions qui déclenchent le bug
      placeholder: |
        1. Ouvrir un fichier PDF
        2. Cliquer sur "Fusionner"
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      placeholder: Je m'attendais à ce que…
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Captures d'écran
      description: Glissez-déposez des images ici si utile
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Contexte supplémentaire
      description: Type de PDF, taille du fichier, langue de l'app…
    validations:
      required: false
